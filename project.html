<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Youssef Erremili</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/image/icons/favicon.ico" type="image/x-icon">

    <!-- Theme color -->
    <meta name="theme-color" content="#3ccf91">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/style/output.css">
    <link rel="stylesheet" href="assets/style/fonts.css">
</head>

<body class="bg-shade-blue min-h-screen text-site-white-sm font-mono [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-track]:bg-shade-blue [&::-webkit-scrollbar-thumb]:bg-slate-700 [&::-webkit-scrollbar-thumb]:rounded-full hover:[&::-webkit-scrollbar-thumb]:bg-slate-600">
    <div class="w-[90%] max-w-[1400px] min-h-inherit mx-auto" x-data="projectDetail">
        <main class="py-12 md:py-20 px-4 max-w-5xl mx-auto min-h-[85vh] flex flex-col justify-center w-full">

            <div x-show="loading" class="flex justify-center items-center py-20">
                <div class="relative w-[72px] h-[72px]">
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox1_4s_infinite] [transform:rotate(45deg)]" style="left: 0; top: 0; margin-left: 26px;"></div>
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox2_4s_infinite] [transform:rotate(45deg)]" style="left: 26px; top: 0;"></div>
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox3_4s_infinite] [transform:rotate(45deg)]" style="left: 52px; top: 0; margin-top: 52px;"></div>
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox4_4s_infinite] [transform:rotate(45deg)]" style="left: 0; top: 26px; margin-left: 26px;"></div>
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox5_4s_infinite] [transform:rotate(45deg)]" style="left: 26px; top: 26px;"></div>
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox6_4s_infinite] [transform:rotate(45deg)]" style="left: 52px; top: 26px;"></div>
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox7_4s_infinite] [transform:rotate(45deg)]" style="left: 0; top: 52px;"></div>
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox8_4s_infinite] [transform:rotate(45deg)]" style="left: 26px; top: 52px;"></div>
                    <div class="absolute w-5 h-5 rounded-md bg-site-green opacity-70 animate-[moveBox9_4s_infinite] [transform:rotate(45deg)]" style="left: 52px; top: 52px;"></div>
                </div>
            </div>

            <template x-if="!loading && project">
                <div class="w-full">
                    <div class="mb-10">
                        <a href="/"
                            class="inline-flex items-center gap-2 text-site-green hover:text-white transition-all font-semibold bg-site-green/10 px-5 py-2 rounded-full border border-site-green/20 hover:bg-site-green/20 group">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                class="w-5 h-5 transition-transform group-hover:-translate-x-1" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                                    clip-rule="evenodd" />
                            </svg>
                            Back
                        </a>
                    </div>

                    <div
                        class="bg-shade-blue border-2 border-site-green/20 rounded-3xl shadow-2xl overflow-hidden mb-20">
                        <div
                            class="relative h-72 sm:h-[450px] w-full flex items-center justify-center overflow-hidden bg-[#0a1523] border-b border-white/5">
                            <!-- Background blurred version for ambient effect -->
                            <img :src="project.image"
                                class="absolute inset-0 w-full h-full object-cover blur-2xl opacity-30"
                                aria-hidden="true" loading="lazy">
                            <!-- Main clear image -->
                            <img :src="project.image" :alt="project.title"
                                class="relative z-10 max-w-[90%] max-h-[85%] object-contain rounded-2xl shadow-xl transition-transform duration-500 hover:scale-[1.02]"
                                loading="lazy">
                        </div>

                        <div class="p-6 sm:p-10 space-y-8">
                            <h1 class="text-3xl sm:text-5xl font-bold text-site-white tracking-tight capitalize"
                                x-text="project.title">Project Title</h1>
                            <div>
                                <h3 class="text-sm font-semibold text-site-green uppercase tracking-wider mb-4">About
                                    the
                                    Project</h3>
                                <p class="text-base sm:text-lg leading-relaxed text-site-gray"
                                    x-text="project.description">
                                </p>
                            </div>

                            <div>
                                <h3 class="text-sm font-semibold text-desc-gray uppercase tracking-wider mb-4">
                                    Technologies
                                    Used</h3>
                                <div class="flex flex-wrap gap-2">
                                    <template x-for="tech in project.technologies">
                                        <span
                                            :class="'px-3 py-1 text-[0.8rem] font-semibold border-none rounded-[0.4rem] tracking-wide uppercase ' + getColorClass(tech)"
                                            x-text="tech"></span>
                                    </template>
                                </div>
                            </div>

                            <template x-if="project.demo === '' || project.demo === false">
                                <div class="flex items-start p-4 text-sm text-tech-blue rounded-xl bg-tech-blue-bg border border-[#2269f744]"
                                    role="alert">
                                    <svg class="flex-shrink-0 inline w-5 h-5 me-3 mt-0.5" aria-hidden="true"
                                        xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                                        <path
                                            d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z" />
                                    </svg>
                                    <div>
                                        <p class="font-medium">Deployment in Progress</p>
                                        <p class="mt-1 opacity-80">We are currently working on hosting this project and
                                            will
                                            have it live as soon as possible.</p>
                                    </div>
                                </div>
                            </template>

                            <div class="flex flex-col sm:flex-row gap-6 pt-8 border-t border-white/5 mt-10">
                                <a :href="project.demo" x-show="project.demo !== '' && project.demo !== false"
                                    target="_blank" rel="noopener noreferrer"
                                    class="flex-1 group relative flex justify-center items-center px-8 py-5 text-[1rem] font-bold text-shade-blue bg-site-green rounded-2xl transition-all hover:scale-[1.02] shadow-[0_10px_30px_-10px_rgba(60,207,145,0.4)] overflow-hidden">
                                    <span class="relative z-10 flex items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                            stroke-width="2.5" stroke="currentColor" class="w-5 h-5 mr-3">
                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                                        </svg>
                                        View Live Demo
                                    </span>
                                    <div
                                        class="absolute inset-0 w-full h-full bg-white/20 -translate-x-[120%] skew-x-12 group-hover:translate-x-[120%] transition-transform duration-700 ease-in-out">
                                    </div>
                                </a>
                                <a :href="project.link" x-show="project.link !== null" target="_blank"
                                    rel="noopener noreferrer"
                                    class="flex-1 flex justify-center items-center px-8 py-5 text-[1rem] font-bold text-site-white bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/20 transition-all rounded-2xl">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        stroke-width="2.5" stroke="currentColor" class="w-5 h-5 mr-3">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" />
                                    </svg>
                                    Source Code
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <template x-if="!loading && !project">
                <div class="text-center py-20">
                    <h2 class="text-3xl font-bold text-site-white mb-4">Project Not Found</h2>
                    <p class="text-site-gray mb-8">The project you are looking for doesn't exist.</p>
                    <a href="index.html"
                        class="inline-flex items-center px-6 py-3 text-[0.9rem] font-semibold text-site-white-sm bg-link-bg hover:bg-[#2eaa76] rounded-[0.3rem] transition-colors">
                        Back to Portfolio
                    </a>
                </div>
            </template>
        </main>

        <footer
            class="mt-16 mb-5 border-t border-white/5 pt-6 w-full max-[500px]:[&_p_strong]:block max-[500px]:[&_p_strong]:mt-2">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <!-- Left: Name -->
                <p class="text-[.9rem] font-medium text-site-gray text-center sm:text-left">
                    Designed &amp; Developed by
                    <strong class="text-site-green font-semibold">Youssef Erremili</strong>
                </p>

                <!-- Right: Social Icons -->
                <div class="flex items-center gap-4">
                    <!-- Instagram -->
                    <a href="https://www.instagram.com/youssef_erremili" target="_blank" aria-label="Instagram"
                        class="group flex items-center justify-center w-9 h-9 rounded-full bg-white/5 border border-white/10 text-site-gray hover:text-white hover:border-site-green/40 hover:bg-site-green/10 transition-all duration-300">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                        </svg>
                    </a>
                    <!-- GitHub -->
                    <a href="https://github.com/youssef-erremili" target="_blank" rel="noopener noreferrer"
                        aria-label="GitHub"
                        class="group flex items-center justify-center w-9 h-9 rounded-full bg-white/5 border border-white/10 text-site-gray hover:text-white hover:border-site-green/40 hover:bg-site-green/10 transition-all duration-300">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                        </svg>
                    </a>
                    <!-- LinkedIn -->
                    <a href="https://linkedin.com/in/youssef-erremili-100070296" target="_blank"
                        rel="noopener noreferrer" aria-label="LinkedIn"
                        class="group flex items-center justify-center w-9 h-9 rounded-full bg-white/5 border border-white/10 text-site-gray hover:text-white hover:border-site-green/40 hover:bg-site-green/10 transition-all duration-300">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                        </svg>
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <script src="assets/main.js"></script>
    <!-- Alpine.js Plugins -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
    <!-- Alpine.js Core -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</body>

</html>
