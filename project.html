<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Youssef Erremili</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/image/icons/favicon.ico" type="image/x-icon">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/style/style.css">
    <link rel="stylesheet" href="assets/style/output.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#000f19] min-h-screen text-[#fefefe] font-['JetBrains_Mono']">
    <div class="container-COE" x-data="projectDetail">
        <main class="py-12 md:py-20 px-4 max-w-4xl mx-auto min-h-[85vh] flex flex-col justify-center">

            <div x-show="loading" class="flex justify-center items-center py-20">
                <div class="loader"></div>
            </div>

            <div x-show="!loading && project" style="display: none;" class="w-full">
                <div class="mb-8">
                    <a href="/"
                        class="inline-flex items-center gap-2 text-[#cacacc] hover:text-[#3CCF91] transition-colors font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                                clip-rule="evenodd" />
                        </svg>
                        Back
                    </a>
                </div>

                <div class="bg-[#000f19] border border-[#ffffff29] rounded-[8px] shadow-xl overflow-hidden">
                    <div
                        class="relative h-64 sm:h-96 w-full flex items-center justify-center overflow-hidden bg-[#0a1523]">
                        <img :src="project.image" class="absolute inset-0 w-full h-full object-cover blur-xl opacity-20"
                            aria-hidden="true" loading="lazy">
                        <img :src="project.image" :alt="project.title"
                            class="relative z-10 w-full h-full object-contain" loading="lazy">
                        <div
                            class="absolute bottom-0 left-0 w-full p-6 sm:p-10 bg-gradient-to-t from-[#000f19] to-transparent z-20">
                            <h1 class="text-3xl sm:text-4xl font-semibold text-white tracking-wide capitalize"
                                x-text="project.title"></h1>
                        </div>
                    </div>

                    <div class="p-6 sm:p-10 space-y-8">
                        <div>
                            <h3 class="text-sm font-semibold text-[#3CCF91] uppercase tracking-wider mb-4">About the
                                Project</h3>
                            <p class="text-base sm:text-lg leading-relaxed text-[#cacacc]" x-text="project.description">
                            </p>
                        </div>

                        <div>
                            <h3 class="text-sm font-semibold text-[#a0a0a0] uppercase tracking-wider mb-4">Technologies
                                Used</h3>
                            <div class="flex flex-wrap gap-2">
                                <template x-for="tech in project.technologies">
                                    <span
                                        :class="'px-3 py-1 text-[0.8rem] font-semibold border-none rounded-[0.4rem] tracking-wide uppercase ' + getColorClass(tech)"
                                        x-text="tech"></span>
                                </template>
                            </div>
                        </div>

                        <template x-if="project.demo === '' || project.demo === false">
                            <div class="flex items-start p-4 text-sm text-[#2682fb] rounded-xl bg-[#2269f722] border border-[#2269f744]"
                                role="alert">
                                <svg class="flex-shrink-0 inline w-5 h-5 me-3 mt-0.5" aria-hidden="true"
                                    xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                                    <path
                                        d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z" />
                                </svg>
                                <div>
                                    <p class="font-medium">Deployment in Progress</p>
                                    <p class="mt-1 opacity-80">We are currently working on hosting this project and will
                                        have it live as soon as possible.</p>
                                </div>
                            </div>
                        </template>

                        <div class="flex flex-col sm:flex-row gap-4 pt-6 border-t border-[#ffffff29] mt-6">
                            <a :href="project.demo" x-show="project.demo !== '' && project.demo !== false"
                                target="_blank" rel="noopener noreferrer"
                                class="flex-1 flex justify-center items-center px-6 py-4 text-[0.9rem] font-semibold text-[#000f19] bg-[#3CCF91] hover:bg-[#2eaa76] rounded-[0.3rem] transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                    stroke="currentColor" class="w-5 h-5 mr-2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                                </svg>
                                View Live Demo
                            </a>
                            <a :href="project.link" x-show="project.link !== null" target="_blank"
                                rel="noopener noreferrer"
                                class="flex-1 flex justify-center items-center px-6 py-4 text-[0.9rem] font-semibold text-[#fefefe] bg-[#202022] hover:bg-[#2eaa76] rounded-[0.3rem] transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                    stroke="currentColor" class="w-5 h-5 mr-2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" />
                                </svg>
                                Source Code
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="!loading && !project" style="display: none;" class="text-center py-20">
                <h2 class="text-3xl font-bold text-white mb-4">Project Not Found</h2>
                <p class="text-[#cacacc] mb-8">The project you are looking for doesn't exist.</p>
                <a href="index.html"
                    class="inline-flex items-center px-6 py-3 text-[0.9rem] font-semibold text-[#fefefe] bg-[#202022] hover:bg-[#2eaa76] rounded-[0.3rem] transition-colors">
                    Back to Portfolio
                </a>
            </div>
        </main>

        <footer class="text-center py-6 mt-auto">
            <p class="text-[0.9rem] font-medium text-[#cacacc]">Designed and Developed by <strong
                    class="text-[#3CCF91]">Youssef Erremili</strong></p>
        </footer>
    </div>

    <script src="assets/main.js"></script>
    <!-- Alpine.js Plugins -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
    <!-- Alpine.js Core -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</body>

</html>
